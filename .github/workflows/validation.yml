name: Research Validation Layer

on:
  push:
    branches:
      - main
      - feature/validation-runtime-v1
  pull_request:
    paths:
      - "validation/**"
      - "replay/**"
      - "tests/**"
      - "models/**"
      - "schemas/**"
      - "datasets/**"
      - "registry/EQ_BIBLE_OMEGA.md"
      - ".github/workflows/validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile validation code
        run: python -m compileall -q validation replay tests

      - name: Validate JSON artifacts
        run: |
          python -m json.tool schemas/equation-record.schema.json > /dev/null
          python -m json.tool schemas/validation-case.schema.json > /dev/null
          python -m json.tool models/governance-state-model.json > /dev/null
          python -m json.tool validation/cases/runtime_integrity_cases.json > /dev/null
          python -m json.tool manifests/validation-suite-v1.json > /dev/null

      - name: Run deterministic replay
        run: python replay/run_replay.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify report output
        run: |
          test -s reports/latest_validation_results.json
          python -m json.tool reports/latest_validation_results.json > /dev/null

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: sovrint-validation-report
          path: reports/latest_validation_results.json
