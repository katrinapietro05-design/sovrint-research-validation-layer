name: Research Validation Layer

on:
  push:
    branches:
      - main
      - feature/validation-runtime-v1
  pull_request:
    paths:
      - "validation/**"
      - "replay/**"
      - "tests/**"
      - "models/**"
      - "schemas/**"
      - "datasets/**"
      - "manifests/**"
      - "registry/EQ_BIBLE_OMEGA.md"
      - ".github/workflows/validation.yml"

permissions:
  contents: read

env:
  TARGET_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  runner-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Confirm runner and Python
        run: |
          echo "runner-ready"
          python3 --version
          git --version

  checkout-smoke:
    needs: runner-diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout without external actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${TARGET_SHA}"
          git checkout --detach FETCH_HEAD
          test -s README.md
          test -s validation/engine.py

  syntax-and-data:
    needs: checkout-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout without external actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${TARGET_SHA}"
          git checkout --detach FETCH_HEAD
      - name: Compile validation code
        run: python3 -m compileall -q validation replay tests
      - name: Validate JSON artifacts
        run: |
          python3 -m json.tool schemas/equation-record.schema.json > /dev/null
          python3 -m json.tool schemas/validation-case.schema.json > /dev/null
          python3 -m json.tool models/governance-state-model.json > /dev/null
          python3 -m json.tool validation/cases/runtime_integrity_cases.json > /dev/null
          python3 -m json.tool manifests/validation-suite-v1.json > /dev/null
          python3 -m json.tool notebooks/reproducibility_walkthrough.ipynb > /dev/null

  deterministic-replay:
    needs: syntax-and-data
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout without external actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${TARGET_SHA}"
          git checkout --detach FETCH_HEAD
      - name: Run replay and verify report
        run: |
          python3 replay/run_replay.py
          test -s reports/latest_validation_results.json
          python3 -m json.tool reports/latest_validation_results.json > /dev/null
          grep -q '"suite_passed": true' reports/latest_validation_results.json

  unit-tests:
    needs: deterministic-replay
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout without external actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${TARGET_SHA}"
          git checkout --detach FETCH_HEAD
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
